<html>

<head>
	<meta charset="utf-8">

	<meta name="viewport"
		content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, minimal-ui">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">

	<title>订单确认</title>
	<link href="../resources/style/order.css" rel="stylesheet">


</head>

<body>

	<div>
		<iframe id="weixin_iframe" height="0"></iframe>
	</div>
</body>

<script>
	window.onAfterLoad = function () {
		var me = this;
		KISSY.use('app/order/mods/OrderConfirm, app/app, app/data/router', function (S, OrderConfirm, app) {
			if (!app.isLogined()) {

				S.use('app/login/mods/LoginModal, css/login.css', function (S, LoginModal, login_css) {
					var loginModal = new LoginModal();
					loginModal.on('loginsuc', function (e) {
						var orderConfirm = new OrderConfirm();
						orderConfirm.on("afterrender", function () {
							me.onafterrender();
						});

						orderConfirm.render(S.one(document.body));
					});
					loginModal.show();
				});
			} else {
				var orderConfirm = new OrderConfirm();
				orderConfirm.on("afterrender", function () {
					me.onafterrender();
				});
				orderConfirm.render(S.one(document.body));
			}

		});
	};
	
	var onafterrender = function () {

	}


</script>
<script src="../startup.js" type="text/javascript"></script>


</html>
